name: Stability

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Ubuntu / npm test
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install npm dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Show Node.js and Docker versions
        run: |
          node -v
          npm -v
          docker --version
          docker buildx version

      - name: Run hash stability suite
        run: npm test
