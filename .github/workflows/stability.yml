name: Stability

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stability-${{ github.ref }}
  cancel-in-progress: true

env:
  WINDOWS_ONEAPI_URL: https://raw.githubusercontent.com/oneapi-src/oneapi-ci/master/.github/workflows/build_all.yml
  WINDOWS_ONEAPI_PACKAGE: intel-oneapi-toolkit
  WINDOWS_DPCPP_COMPONENTS: intel.oneapi.win.cpp-dpcpp-common
  ONEAPI_ROOT: C:/Program Files (x86)/Intel/oneAPI

jobs:
  package-linux-x64:
    name: Ubuntu / package
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/.ghcup \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk
          docker system prune --all --force || true
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build native addon in release image
        run: ./r.sh node -e "console.log('mominer build ready')"

      - name: Package release archive
        run: .github/workflows/scripts/package-linux.sh

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: mominer-lin-package
          path: mominer-*-lin.tgz

  test-linux-x64:
    name: Ubuntu / ${{ matrix.suite }}
    needs: package-linux-x64
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        suite:
          - cpu
          - sycl-cpu
          - gpu

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Download package
        uses: actions/download-artifact@v7
        with:
          name: mominer-lin-package
          path: dist

      - name: Test extracted package
        run: |
          set -euo pipefail
          archive="$(find dist -name 'mominer-*-lin.tgz' -print -quit)"
          .github/workflows/scripts/test-release-linux.sh "$archive" "${{ matrix.suite }}"

  package-windows-x64:
    name: Windows / package
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Use oneAPI installation cache
        uses: actions/cache@v5
        id: cache-oneapi
        with:
          path: |
            ${{ env.ONEAPI_ROOT }}
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/Platforms/*/PlatformToolsets/Intel*
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/BuildCustomizations/Intel*
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/Intel*.dll
          key: oneapi-windows-2026.0.0-toolkit-dpcpp-online-v3

      - name: Install Intel oneAPI
        if: steps.cache-oneapi.outputs.cache-hit != 'true'
        shell: cmd
        run: .github\workflows\scripts\install-oneapi.bat "%WINDOWS_ONEAPI_URL%" "%WINDOWS_DPCPP_COMPONENTS%" "%WINDOWS_ONEAPI_PACKAGE%"

      - name: Build native addon
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\build-windows.ps1

      - name: Package release archive
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\package-windows.ps1

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: mominer-win-package
          path: mominer-*-win.zip

  test-windows-x64:
    name: Windows / ${{ matrix.suite }}
    needs: package-windows-x64
    runs-on: windows-2022
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        suite:
          - cpu
          - sycl-cpu
          - gpu

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Download package
        uses: actions/download-artifact@v7
        with:
          name: mominer-win-package
          path: dist

      - name: Install Intel OpenCL CPU runtime
        if: matrix.suite == 'sycl-cpu'
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\install-opencl-runtime-windows.ps1

      - name: Test extracted package
        shell: powershell
        run: |
          $archive = Get-ChildItem dist -Filter "mominer-*-win.zip" | Select-Object -First 1
          powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\test-release-windows.ps1 -Archive $archive.FullName -Suite "${{ matrix.suite }}"
